<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pho Love · POS (demo)</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --coral:#F0503E; --pink:#EC4B8E; --grad:linear-gradient(120deg,#F0503E,#EC4B8E);
    --ink:#211C1B; --cream:#F8F2E9; --cream-2:#F1E7D8; --maroon:#6F2A2E;
    --white:#fff; --muted:#857871; --line:rgba(33,28,27,.12); --ok:#2e9e5b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--cream-2);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:'Poppins',sans-serif;font-weight:700;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  .pos{display:flex;flex-direction:column;height:100vh}

  .posbar{display:flex;align-items:center;gap:18px;padding:12px 20px;background:#fff;border-bottom:1px solid var(--line);flex:none}
  .posbar .logo{height:38px}
  .demo{font-family:'Poppins';font-weight:700;font-size:11px;letter-spacing:.12em;color:var(--coral);border:1.5px solid var(--coral);border-radius:999px;padding:3px 10px}
  .seg{display:flex;background:var(--cream-2);border-radius:999px;padding:4px;gap:2px;margin-left:auto}
  .seg button{font-family:'Poppins';font-weight:600;font-size:13px;padding:8px 16px;border-radius:999px;color:var(--muted)}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.1)}
  .clock{font-family:'Poppins';font-weight:600;font-size:13px;color:var(--muted);min-width:74px;text-align:right}

  .posbody{display:flex;flex:1;min-height:0}
  .menu{flex:1;display:flex;flex-direction:column;min-width:0;padding:18px 20px}
  .cats{display:flex;gap:10px;overflow-x:auto;padding-bottom:14px;flex:none}
  .cat{font-family:'Poppins';font-weight:600;font-size:14px;padding:10px 18px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--ink);white-space:nowrap;transition:.15s}
  .cat.on{background:var(--grad);color:#fff;border-color:transparent}
  .items{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;overflow-y:auto;padding:4px 4px 20px;align-content:start}
  .item{position:relative;background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px 14px;text-align:left;transition:transform .12s,box-shadow .12s;min-height:96px;display:flex;flex-direction:column;justify-content:space-between}
  .item:hover{transform:translateY(-2px);box-shadow:0 10px 24px -14px rgba(111,42,46,.5)}
  .item:active{transform:scale(.97)}
  .item .nm{font-family:'Poppins';font-weight:600;font-size:14.5px;line-height:1.25}
  .item .pr{font-family:'Poppins';font-weight:700;color:var(--coral);font-size:15px;margin-top:10px}
  .item .qb{position:absolute;top:8px;right:8px;min-width:22px;height:22px;border-radius:999px;background:var(--grad);color:#fff;font-family:'Poppins';font-weight:700;font-size:12px;display:none;align-items:center;justify-content:center;padding:0 6px}
  .item.has .qb{display:flex}

  .order{width:372px;flex:none;background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column}
  .ohead{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .ohead .t{font-family:'Poppins';font-weight:700;font-size:17px}
  .ohead .s{font-size:13px;color:var(--muted)}
  .lines{flex:1;overflow-y:auto;padding:8px 20px}
  .empty{color:var(--muted);text-align:center;padding:54px 16px;font-size:14px}
  .empty .bowl{font-size:30px;opacity:.5}
  .line{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
  .line .ln{flex:1;min-width:0}
  .line .ln b{font-family:'Poppins';font-weight:600;font-size:14.5px;display:block}
  .line .ln span{font-size:13px;color:var(--muted)}
  .step{display:flex;align-items:center;gap:9px}
  .step button{width:28px;height:28px;border-radius:8px;background:var(--cream-2);font-size:17px;font-weight:700;color:var(--ink);line-height:1;display:flex;align-items:center;justify-content:center}
  .step button:hover{background:var(--cream)}
  .step .q{font-family:'Poppins';font-weight:700;min-width:18px;text-align:center}
  .line .lp{font-family:'Poppins';font-weight:700;min-width:58px;text-align:right;font-size:14.5px}

  .totals{padding:16px 20px;border-top:1px solid var(--line);background:var(--cream)}
  .trow{display:flex;justify-content:space-between;font-size:14px;color:var(--muted);padding:3px 0}
  .trow.grand{font-family:'Poppins';font-weight:800;font-size:22px;color:var(--ink);margin-top:8px}
  .actions{padding:16px 20px 20px;display:grid;gap:10px}
  .btn{font-family:'Poppins';font-weight:700;font-size:15px;padding:15px;border-radius:14px;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-grad{background:var(--grad);color:#fff;box-shadow:0 10px 24px -10px rgba(236,75,142,.7)}
  .btn-grad:hover{transform:translateY(-1px)}
  .btn-grad:disabled{opacity:.4;box-shadow:none;transform:none;cursor:not-allowed}
  .btn-row{display:flex;gap:10px}
  .btn-row .btn{flex:1}
  .btn-ink{background:var(--ink);color:#fff}
  .btn-light{background:var(--cream-2);color:var(--ink)}
  .btn-light:hover{background:var(--cream)}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-family:'Poppins';font-weight:600;font-size:15px;padding:14px 22px;border-radius:14px;box-shadow:0 18px 40px -12px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.3s;z-index:50;display:flex;align-items:center;gap:10px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .h{color:#FF9FC4;font-size:18px}

  .modal-bg{position:fixed;inset:0;background:rgba(33,28,27,.55);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:22px;max-width:380px;width:100%;padding:34px 30px;text-align:center}
  .modal .ic{width:64px;height:64px;border-radius:50%;background:var(--grad);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px}
  .modal h3{font-size:22px;margin-bottom:6px}
  .modal p{color:var(--muted);font-size:15px;margin-bottom:22px}
  .modal .big{font-family:'Poppins';font-weight:800;font-size:34px;color:var(--ink);margin-bottom:6px}

  @media(max-width:820px){
    .posbody{flex-direction:column}
    .order{width:100%;border-left:none;border-top:1px solid var(--line);max-height:46vh}
    .seg button{padding:8px 12px}
  }
</style>
</head>
<body>
<div class="pos">
  <div class="posbar">
    <img class="logo" src="logo.png" alt="Pho Love">
    <span class="demo">Demo POS</span>
    <div class="seg" id="seg">
      <button class="on" data-type="Dine-in">Dine-in</button>
      <button data-type="Takeout">Takeout</button>
      <button data-type="Delivery">Delivery</button>
    </div>
    <div class="clock" id="clock">—</div>
  </div>

  <div class="posbody">
    <div class="menu">
      <div class="cats" id="cats"></div>
      <div class="items" id="items"></div>
    </div>

    <aside class="order">
      <div class="ohead">
        <div><div class="t">Order #<span id="onum">1042</span></div><div class="s" id="otype">Dine-in</div></div>
        <div class="s" id="ocount">0 items</div>
      </div>
      <div class="lines" id="lines"></div>
      <div class="totals">
        <div class="trow"><span>Subtotal</span><span id="sub">$0.00</span></div>
        <div class="trow"><span>PA tax (6%)</span><span id="tax">$0.00</span></div>
        <div class="trow grand"><span>Total</span><span id="total">$0.00</span></div>
      </div>
      <div class="actions">
        <button class="btn btn-grad" id="send" disabled>Send to kitchen</button>
        <div class="btn-row">
          <button class="btn btn-ink" id="charge" disabled>Charge</button>
          <button class="btn btn-light" id="clear">Clear</button>
        </div>
      </div>
    </aside>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-bg" id="modalbg">
  <div class="modal">
    <div class="ic" id="modalIc">♥</div>
    <div class="big" id="modalBig" style="display:none"></div>
    <h3 id="modalTitle">Order sent</h3>
    <p id="modalText">The kitchen has the ticket.</p>
    <button class="btn btn-grad" onclick="closeModal()">Start next order</button>
  </div>
</div>

<script>
  var MENU = [
    {c:"Pho", items:[["Pho Dac Biet",14.5],["Pho Tai",13],["Pho Ga",12.5],["Veggie & Tofu Pho",12]]},
    {c:"Bun & Rice", items:[["Grilled Pork Bun",13],["Grilled Chicken Bun",13],["Spring Roll Bun",13],["Lemongrass Chicken Rice",12.5],["Build-your-own Bowl",11]]},
    {c:"Thai & Rice", items:[["Pad Thai",13.5],["Drunken Noodles",13.5],["Pineapple Fried Rice",13],["Combination Fried Rice",13],["Lo Mein",12.5]]},
    {c:"Starters", items:[["Fresh Spring Rolls (2)",4.5],["Fried Egg Rolls (3)",5.5],["Crab Rangoon (4)",5.5],["Dumplings (6)",6.5],["Edamame",4]]},
    {c:"Drinks", items:[["Vietnamese Iced Coffee",4.5],["Thai Tea",4.5],["Boba",5],["Soft Drink",2.5]]}
  ];
  var TAX = 0.06, activeCat = MENU[0].c, order = {}, onum = 1042, otype = "Dine-in";

  var catsEl=document.getElementById('cats'), itemsEl=document.getElementById('items'), linesEl=document.getElementById('lines');
  function money(n){return '$'+n.toFixed(2);}

  function renderCats(){
    catsEl.innerHTML='';
    MENU.forEach(function(g){
      var b=document.createElement('button');
      b.className='cat'+(g.c===activeCat?' on':''); b.textContent=g.c;
      b.onclick=function(){activeCat=g.c;renderCats();renderItems();};
      catsEl.appendChild(b);
    });
  }
  function renderItems(){
    itemsEl.innerHTML='';
    var g=MENU.find(function(x){return x.c===activeCat;});
    g.items.forEach(function(it){
      var name=it[0], price=it[1], q=order[name]?order[name].qty:0;
      var b=document.createElement('button');
      b.className='item'+(q?' has':'');
      b.innerHTML='<span class="qb">'+q+'</span><span class="nm">'+name+'</span><span class="pr">'+money(price)+'</span>';
      b.onclick=function(){add(name,price);};
      itemsEl.appendChild(b);
    });
  }
  function add(name,price){
    if(order[name])order[name].qty++; else order[name]={name:name,price:price,qty:1};
    renderItems(); renderOrder();
  }
  function chg(name,d){
    if(!order[name])return;
    order[name].qty+=d;
    if(order[name].qty<=0)delete order[name];
    renderItems(); renderOrder();
  }
  function renderOrder(){
    var keys=Object.keys(order), sub=0, count=0;
    linesEl.innerHTML='';
    if(!keys.length){
      linesEl.innerHTML='<div class="empty"><div class="bowl">🍜</div><div style="margin-top:8px">Tap a dish to start the order</div></div>';
    }
    keys.forEach(function(k){
      var o=order[k]; sub+=o.price*o.qty; count+=o.qty;
      var row=document.createElement('div'); row.className='line';
      row.innerHTML='<div class="ln"><b>'+o.name+'</b><span>'+money(o.price)+' each</span></div>'+
        '<div class="step"><button aria-label="less">–</button><span class="q">'+o.qty+'</span><button aria-label="more">+</button></div>'+
        '<div class="lp">'+money(o.price*o.qty)+'</div>';
      var btns=row.querySelectorAll('.step button');
      btns[0].onclick=function(){chg(k,-1);}; btns[1].onclick=function(){chg(k,1);};
      linesEl.appendChild(row);
    });
    var tax=sub*TAX, total=sub+tax;
    document.getElementById('sub').textContent=money(sub);
    document.getElementById('tax').textContent=money(tax);
    document.getElementById('total').textContent=money(total);
    document.getElementById('ocount').textContent=count+(count===1?' item':' items');
    document.getElementById('send').disabled=!count;
    document.getElementById('charge').disabled=!count;
    document.getElementById('charge').textContent=count?('Charge '+money(total)):'Charge';
  }

  var toastEl=document.getElementById('toast'), toastT;
  function toast(msg){
    toastEl.innerHTML='<span class="h">♥</span> '+msg; toastEl.classList.add('show');
    clearTimeout(toastT); toastT=setTimeout(function(){toastEl.classList.remove('show');},2600);
  }
  function openModal(opts){
    document.getElementById('modalIc').textContent=opts.ic||'♥';
    var big=document.getElementById('modalBig');
    if(opts.big){big.style.display='block';big.textContent=opts.big;}else{big.style.display='none';}
    document.getElementById('modalTitle').textContent=opts.title;
    document.getElementById('modalText').textContent=opts.text;
    document.getElementById('modalbg').classList.add('show');
  }
  function closeModal(){document.getElementById('modalbg').classList.remove('show');newOrder();}
  function newOrder(){order={};onum++;document.getElementById('onum').textContent=onum;renderItems();renderOrder();}

  document.getElementById('send').onclick=function(){
    if(!Object.keys(order).length)return;
    openModal({ic:'♥',title:'Sent to the kitchen',text:'Order #'+onum+' ('+otype+') is on the line. Made with love.'});
  };
  document.getElementById('charge').onclick=function(){
    if(!Object.keys(order).length)return;
    var total=document.getElementById('total').textContent;
    openModal({ic:'✓',big:total,title:'Payment captured',text:'Demo only — no real card was charged.'});
  };
  document.getElementById('clear').onclick=function(){order={};renderItems();renderOrder();toast('Order cleared');};

  document.getElementById('seg').addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b)return;
    [].forEach.call(this.children,function(c){c.classList.remove('on');});
    b.classList.add('on'); otype=b.dataset.type; document.getElementById('otype').textContent=otype;
  });

  function tick(){var d=new Date();var h=d.getHours(),m=d.getMinutes();var ap=h>=12?'PM':'AM';h=h%12||12;document.getElementById('clock').textContent=h+':'+(m<10?'0':'')+m+' '+ap;}
  tick(); setInterval(tick,15000);
  renderCats(); renderItems(); renderOrder();
</script>
</body>
</html>
